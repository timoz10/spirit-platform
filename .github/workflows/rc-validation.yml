# RC validation — multi-platform fresh-install matrix.
#
# Triggered by tags matching v*-rc* / v*-test* pushed to the public
# mirror. Designed to live on `timoz10/spirit-platform` (the public
# mirror), where the publish.yml workflow already lives. This file
# is part of the private repo so it travels through the public-mirror
# allowlist when merged.
#
# Phase 2 gate from RELEASE_ENGINEERING_PROCESS.md: the multi-platform
# install matrix. If any platform's `pipx install` + runtime smoke
# fails, the RC is rejected and the release does not proceed.
#
# How it fits in the publish chain:
#   - publish.yml fires on the same tag and uploads to TestPyPI
#   - This workflow waits for TestPyPI to have the artifact, then
#     installs from TestPyPI on each platform
#   - Both run in parallel against the same tag — no inter-dependency
#
# Required for promotion to a full-release tag:
#   - All platforms must reach GREEN LIGHT
#   - Zero Python tracebacks or ModuleNotFoundErrors

name: RC Validation (multi-platform install matrix)

on:
  push:
    tags:
      - 'v*-rc*'
      - 'v*-test*'

concurrency:
  group: rc-validation-${{ github.ref }}
  cancel-in-progress: false   # don't cancel mid-soak

jobs:
  wait-for-testpypi:
    name: Wait for TestPyPI to serve the artifact
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse version from tag
        id: parse
        run: |
          # github.ref is refs/tags/vX.Y.Z-rcN (e.g. v2.2.3-rc1).
          #
          # Multi-RC convention (since #728 closed): the wheel version
          # carries the PEP 440 rc suffix.
          #
          #   v2.2.3-rc1   → wheel version 2.2.3rc1   → TestPyPI
          #   v2.2.3-rc2   → wheel version 2.2.3rc2   → TestPyPI
          #   v2.2.3-test1 → wheel version 2.2.3.dev1 → TestPyPI
          #   v2.2.3       → wheel version 2.2.3      → real PyPI
          #
          # Each RC has a distinct wheel filename so iterating doesn't
          # require manual TestPyPI cleanup.
          TAG="${GITHUB_REF#refs/tags/v}"
          # Mirror publish.yml's normalisation: strip the dash before
          # rc/test, since PEP 440 expects no dash.
          WHEEL_VERSION="${TAG/-rc/rc}"
          WHEEL_VERSION="${WHEEL_VERSION/-test/.dev}"
          echo "version=${WHEEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Tag is v${TAG}, wheel version is ${WHEEL_VERSION}"

      - name: Poll TestPyPI for the version (max 5 min)
        run: |
          VERSION="${{ steps.parse.outputs.version }}"
          for i in $(seq 1 30); do
            # TestPyPI simple-index — what pip actually reads.
            # Filename pattern: spirit_platform-<bare version>-py3-none-any.whl
            URL="https://test.pypi.org/simple/spirit-platform/"
            if curl -s "$URL" | grep -q "spirit_platform-${VERSION}-"; then
              echo "TestPyPI has spirit-platform==${VERSION}"
              exit 0
            fi
            echo "Attempt $i/30 — not yet visible on TestPyPI, sleeping 10s"
            sleep 10
          done
          echo "::error::TestPyPI didn't surface spirit-platform==${VERSION} within 5 min"
          exit 1

  install-matrix:
    name: Install + runtime smoke on ${{ matrix.os }}
    needs: wait-for-testpypi
    timeout-minutes: 15
    strategy:
      fail-fast: false   # show every platform's result, not just the first to fail
      matrix:
        include:
          - os: ubuntu-22.04
            container: ""
          - os: ubuntu-24.04
            container: ""
          - os: ubuntu-latest
            # Debian Bookworm's default Python is 3.11; Spirit requires
            # >=3.12. Use the official python:3.12 container based on
            # bookworm so the matrix actually validates the "Debian 12
            # with a 3.12 interpreter on PATH" path that real customers
            # take (deadsnakes / pyenv / bookworm-backports). Pure
            # default-Debian-12 isn't a supported install target — flag
            # in INSTALL.md as a follow-up.
            container: "python:3.12-slim-bookworm"
          # macOS pending #715 (smoke-test installation on macOS) —
          # when that issue ships, uncomment:
          # - os: macos-latest
          #   container: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Install OS prerequisites (Debian-bookworm container)
        if: matrix.container == 'python:3.12-slim-bookworm'
        run: |
          # python:3.12-slim ships python+pip but not pipx. We pull pipx via
          # pip (NOT apt) so it binds to the container's Python 3.12 — apt's
          # Bookworm pipx uses system Python 3.11, which can't install Spirit
          # (Requires-Python >=3.12). curl + ca-certificates come from apt
          # since they're not Python packages.
          apt-get update
          apt-get install -y curl ca-certificates
          python3 -m pip install --break-system-packages --no-cache-dir pipx
          python3 -m pipx ensurepath
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Pin Python 3.12 (Ubuntu hosted runner)
        if: matrix.container == ''
        # Ubuntu 22.04's default Python is 3.10; 24.04 has 3.12. Pin
        # 3.12 explicitly so the matrix actually validates the
        # Spirit-supported interpreter on every Ubuntu version.
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipx (Ubuntu hosted runner)
        if: matrix.container == ''
        run: |
          python3 -m pip install --upgrade pipx
          python3 -m pipx ensurepath

      - name: Install spirit-platform from TestPyPI
        run: |
          VERSION="${{ needs.wait-for-testpypi.outputs.version }}"
          # --pip-args: --no-cache-dir avoids stale cache between matrix runs;
          #             --pre allows the rc-suffixed version to satisfy the spec;
          #             --extra-index-url falls back to real PyPI for the
          #             transitive deps that aren't on TestPyPI (pandas, etc.)
          pipx install \
            --pip-args="--no-cache-dir --pre --extra-index-url https://pypi.org/simple/" \
            --index-url "https://test.pypi.org/simple/" \
            "spirit-platform==${VERSION}"

      - name: Verify pipx listing
        run: |
          # Ensure path is set up (no-op if already done)
          export PATH="$HOME/.local/bin:$PATH"
          pipx list | grep "spirit-platform ${{ needs.wait-for-testpypi.outputs.version }}"

      # Smoke gates enforce the diagnostic-tool exit-code contracts from
      # docs/reference/MODULE_CONTRACTS.md — fresh CI box, exact codes only.
      - name: Smoke — spirit-health (assert RC_NO_INSTANCES=1)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          spirit-health > health.log 2>&1
          STATUS=$?
          set -e
          cat health.log
          if grep -q "Traceback\|ModuleNotFoundError" health.log; then
            echo "::error::spirit-health produced a Python traceback on ${{ matrix.os }}"
            exit 1
          fi
          if [ "$STATUS" -ne 1 ]; then
            echo "::error::spirit-health exited $STATUS on ${{ matrix.os }}, expected 1 (RC_NO_INSTANCES)"
            echo "::error::See docs/reference/MODULE_CONTRACTS.md for the contract"
            exit 1
          fi

      - name: Smoke — spirit-preflight (assert RC_DIAGNOSTIC_BLOCKING=1)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          spirit-preflight > preflight.log 2>&1
          STATUS=$?
          set -e
          cat preflight.log
          if grep -q "Traceback\|ModuleNotFoundError" preflight.log; then
            echo "::error::spirit-preflight produced a Python traceback on ${{ matrix.os }}"
            exit 1
          fi
          if [ "$STATUS" -ne 1 ]; then
            echo "::error::spirit-preflight exited $STATUS on ${{ matrix.os }}, expected 1 (RC_DIAGNOSTIC_BLOCKING)"
            echo "::error::See docs/reference/MODULE_CONTRACTS.md for the contract"
            exit 1
          fi

      - name: Smoke — spirit --mode test for 5 minutes
        # Longer runtime than the per-PR gate (30s) because RC validation
        # is the LAST gate before release — we want maximum confidence.
        # 5 minutes covers Kraken warmup + ingestion of multiple 1m
        # candles, exercises the main loop more thoroughly.
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export SPIRIT_TIER=free
          export SPIRIT_STRATEGY=macd_demo
          export SPIRIT_INSTANCE=rc-smoke
          export SPIRIT_PAIRS=XBTUSD
          set +e
          timeout --preserve-status 300 spirit --mode test 2>&1 | tee runtime.log
          STATUS=$?
          set -e

          if [ "$STATUS" != "124" ] && [ "$STATUS" != "143" ] && [ "$STATUS" != "0" ]; then
            echo "::error::spirit --mode test exited with $STATUS on ${{ matrix.os }} (expected 124/143/0)"
            tail -60 runtime.log
            exit 1
          fi

          if grep -q "Traceback\|ModuleNotFoundError" runtime.log; then
            echo "::error::spirit --mode test produced a Python traceback on ${{ matrix.os }}"
            grep -B2 -A10 "Traceback\|ModuleNotFoundError" runtime.log
            exit 1
          fi

          # GREEN LIGHT IS REQUIRED for RC validation (unlike the per-PR
          # gate where it's a warning). 5 minutes is plenty to reach it.
          if ! grep -q "GREEN LIGHT" runtime.log; then
            echo "::error::spirit --mode test did not reach [GREEN LIGHT] within 5 minutes on ${{ matrix.os }}"
            tail -60 runtime.log
            exit 1
          fi

          # Bonus assertion: should see at least one [SPIRIT] alive
          # heartbeat or 1m candle ingestion. If not, the loop isn't
          # actually progressing — log a warning.
          if ! grep -qE "SPIRIT.*alive|KrakenOHLCBuffer.*Warmup complete" runtime.log; then
            echo "::warning::No alive heartbeat or warmup completion line on ${{ matrix.os }}"
          fi

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Container suffix dropped — `python:3.12-slim-bookworm` contains a
          # colon, which GitHub Actions rejects as an invalid artifact name.
          # matrix.os is unique per cell so artifact-name collision is not
          # possible.
          name: rc-smoke-${{ matrix.os }}
          path: |
            health.log
            preflight.log
            runtime.log
          retention-days: 14

  upgrade-matrix:
    name: Upgrade from latest PyPI on ${{ matrix.os }}
    needs: wait-for-testpypi
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            container: ""
          - os: ubuntu-24.04
            container: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    # Why an upgrade matrix exists:
    #   Customers running `pipx upgrade spirit-platform` after a release
    #   need their existing ~/.spirit/<instance>/ to keep working. This
    #   job proves that the new wheel can take over from the latest
    #   PyPI version (the one customers already have) without:
    #     - breaking instance-directory discovery
    #     - producing a Python traceback on spirit-health / spirit-preflight
    #     - changing the spirit-health exit-code matrix in a way that
    #       would surprise monitoring scripts
    #
    # We don't run a full `spirit --mode test` here — the install-matrix
    # job covers fresh-install runtime. This job is specifically about
    # the upgrade hop.
    steps:
      - name: Pin Python 3.12 (Spirit requires >=3.12)
        # Ubuntu 22.04's default Python is 3.10; without this step pip
        # would reject every spirit-platform wheel as "wrong python".
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipx (Ubuntu hosted runner)
        run: |
          python3 -m pip install --upgrade pipx
          python3 -m pipx ensurepath

      - name: Install LATEST PyPI version (simulate existing customer)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # No version pin — installs whatever PyPI currently calls latest.
          # That's what `pipx upgrade` resolves against, so it's the right
          # baseline to test upgrades from.
          pipx install spirit-platform
          INSTALLED_VERSION=$(pipx list --json | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['venvs']['spirit-platform']['metadata']['main_package']['package_version'])")
          echo "Baseline (PyPI latest): spirit-platform==${INSTALLED_VERSION}"
          echo "BASELINE_VERSION=${INSTALLED_VERSION}" >> "$GITHUB_ENV"

      - name: Create a synthetic instance directory (mimic spirit-setup output)
        run: |
          # We can't run `spirit-setup` non-interactively yet (questionary
          # has no headless flag). Instead we write the minimal files that
          # spirit-setup would write, so the upgrade can prove instance-dir
          # compatibility without depending on wizard internals.
          mkdir -p "$HOME/.spirit/upgrade-test"
          cat > "$HOME/.spirit/upgrade-test/spirit.yaml" <<EOF
          instance: upgrade-test
          tier: free
          strategy: sma_crossover
          pairs:
            - XBTUSD
          EOF
          cat > "$HOME/.spirit/upgrade-test/.env" <<EOF
          SPIRIT_INSTANCE=upgrade-test
          SPIRIT_TIER=free
          SPIRIT_STRATEGY=sma_crossover
          SPIRIT_PAIRS=XBTUSD
          EOF
          ls -la "$HOME/.spirit/upgrade-test/"

      - name: Capture pre-upgrade spirit-health behavior
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          spirit-health > pre-health.log 2>&1
          PRE_STATUS=$?
          set -e
          cat pre-health.log
          echo "Pre-upgrade spirit-health rc: ${PRE_STATUS}"
          echo "PRE_HEALTH_STATUS=${PRE_STATUS}" >> "$GITHUB_ENV"
          # No assertion on the pre-version's exit code — we don't know what
          # contract the baseline shipped under. We're testing the UPGRADE
          # hop, not the baseline's contract.

      - name: Upgrade to RC wheel from TestPyPI
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          VERSION="${{ needs.wait-for-testpypi.outputs.version }}"
          # --pre is required so TestPyPI's rc-suffixed versions satisfy the
          # version pin. Without it, pip's "no matching distribution" error
          # ignores every 2.2.3rcN candidate.
          pipx install --force \
            --pip-args="--no-cache-dir --pre --extra-index-url https://pypi.org/simple/" \
            --index-url "https://test.pypi.org/simple/" \
            "spirit-platform==${VERSION}"
          # Confirm pipx now reports the new version.
          pipx list | grep "spirit-platform ${VERSION}" || \
            (echo "::error::pipx still reports the baseline version after upgrade"; exit 1)
          echo "Upgraded ${BASELINE_VERSION} → ${VERSION}"

      - name: Post-upgrade spirit-health — instance dir must still work
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          spirit-health > post-health.log 2>&1
          POST_STATUS=$?
          set -e
          cat post-health.log

          if grep -q "Traceback\|ModuleNotFoundError" post-health.log; then
            echo "::error::spirit-health crashed after upgrade — the upgrade-path is broken"
            exit 1
          fi

          # The synthetic instance has no DB, so it's an orphan-config →
          # spirit-health contract: at least one instance exists, none healthy
          # → RC_DEGRADED (2). This is the EXACT expected code for the
          # "config-only, never started" upgrade-test fixture.
          if [ "$POST_STATUS" -ne 2 ]; then
            echo "::error::Post-upgrade spirit-health rc=${POST_STATUS}, expected 2 (RC_DEGRADED for orphan-config instance)"
            echo "::error::See docs/reference/MODULE_CONTRACTS.md for the contract"
            exit 1
          fi

          # Instance must still be discoverable by name — proves the dir
          # convention didn't change between versions.
          if ! grep -q "upgrade-test" post-health.log; then
            echo "::error::spirit-health didn't list the upgrade-test instance after upgrade"
            exit 1
          fi

      - name: Post-upgrade spirit-preflight — must not crash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          set +e
          SPIRIT_INSTANCE=upgrade-test spirit-preflight > post-preflight.log 2>&1
          set -e
          cat post-preflight.log
          if grep -q "Traceback\|ModuleNotFoundError" post-preflight.log; then
            echo "::error::spirit-preflight crashed after upgrade"
            exit 1
          fi

      - name: spirit-setup writes to ~/.spirit/, not into the venv (#733 regression gate)
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          # Take a snapshot of any pre-existing files inside the pipx venv's
          # lib tree so we can diff after spirit-setup runs. If setup writes
          # ANYTHING new under the venv (the pre-#733 bug), this set will
          # be non-empty.
          #
          # Use `pipx environment` to discover the venv root rather than
          # parsing `pipx list --json` — newer pipx versions changed the
          # JSON shape of app_paths from list-of-strings to list-of-dicts,
          # which broke the prior .rsplit('/bin/', 1) extraction.
          VENV_LIB="$(pipx environment --value PIPX_LOCAL_VENVS)/spirit-platform/lib"
          if [ ! -d "$VENV_LIB" ]; then
            echo "::error::Expected pipx venv lib dir not found: $VENV_LIB"
            pipx environment
            exit 1
          fi
          echo "Pipx venv lib tree: ${VENV_LIB}"
          find "$VENV_LIB" -name "spirit.yaml" 2>/dev/null > /tmp/before-setup-yamls.txt || true
          echo "Pre-setup spirit.yaml files inside venv:"
          cat /tmp/before-setup-yamls.txt || echo "  (none)"

          # Drive spirit-setup non-interactively via stdin. The wizard
          # falls back to plain input() when stdin isn't a TTY.
          # Sequence: instance name 'setup-test', tier 'free', accept all
          # other defaults (empty lines = take default). Free-tier prompts
          # are roughly: instance, sqlite path, api key (optional), exchange,
          # exchange keys, pairs, strategy, mode.
          printf 'setup-test\nfree\n\n\n\n\n\n\n\n\n' | timeout 30 spirit-setup || true

          # Now verify two things:
          #
          # 1. The wizard wrote spirit.yaml to ~/.spirit/setup-test/
          if [ ! -f "$HOME/.spirit/setup-test/spirit.yaml" ]; then
            echo "::error::spirit-setup did not write to ~/.spirit/setup-test/spirit.yaml"
            echo "::error::Contents of \$HOME/.spirit/:"
            ls -la "$HOME/.spirit/" || true
            exit 1
          fi
          echo "  ✓ wizard wrote to ~/.spirit/setup-test/spirit.yaml"

          # 2. The wizard did NOT write anything new inside the venv
          find "$VENV_LIB" -name "spirit.yaml" 2>/dev/null > /tmp/after-setup-yamls.txt || true
          if ! diff -q /tmp/before-setup-yamls.txt /tmp/after-setup-yamls.txt > /dev/null; then
            echo "::error::spirit-setup wrote new spirit.yaml file(s) inside the venv — #733 has regressed"
            echo "::error::Before:"
            cat /tmp/before-setup-yamls.txt
            echo "::error::After:"
            cat /tmp/after-setup-yamls.txt
            exit 1
          fi
          echo "  ✓ no new spirit.yaml created inside the venv"

      - name: spirit-preflight autodetects the lone instance (#733 post-setup)
        run: |
          # Post-setup with exactly one ~/.spirit/<name>/ dir on the box,
          # spirit-preflight with NO SPIRIT_INSTANCE env should autodetect
          # the instance and report rc=0 (RC_DIAGNOSTIC_OK).
          #
          # rc2 reported by Tim: preflight stayed in [no-instance] mode and
          # returned rc=1 because get_config didn't autodetect the lone
          # ~/.spirit/setup-test/ dir. Fix landed in config_loader's
          # resolve_active_instance() and logger._resolve_instance().
          # This step is the regression gate.
          export PATH="$HOME/.local/bin:$PATH"

          # Remove the upgrade-test synthetic dir from the earlier step —
          # it was a fixture for the upgrade-path tests; the autodetect
          # assertion below requires exactly one ~/.spirit/<name>/ dir
          # (the freshly-setup-by-the-wizard `setup-test`).
          rm -rf "$HOME/.spirit/upgrade-test"

          # Make sure no other instances exist that would break the autodetect.
          ls -la "$HOME/.spirit/"
          INSTANCE_COUNT=$(find "$HOME/.spirit/" -maxdepth 1 -mindepth 1 -type d -not -name '.*' | wc -l)
          if [ "$INSTANCE_COUNT" -ne 1 ]; then
            echo "::error::expected exactly 1 instance dir for autodetect test, found $INSTANCE_COUNT"
            exit 1
          fi

          # Unset SPIRIT_INSTANCE explicitly — the wizard may have set it
          # in the current shell via .env, but autodetect must work even
          # if the user opens a fresh terminal.
          set +e
          unset SPIRIT_INSTANCE
          spirit-preflight > autodetect-preflight.log 2>&1
          STATUS=$?
          set -e
          cat autodetect-preflight.log

          if grep -q "Traceback\|ModuleNotFoundError" autodetect-preflight.log; then
            echo "::error::spirit-preflight crashed during autodetect"
            exit 1
          fi

          # Free tier + sma_crossover from the wizard → all required env
          # vars resolved → rc=0 (RC_DIAGNOSTIC_OK).
          if [ "$STATUS" -ne 0 ]; then
            echo "::error::spirit-preflight rc=${STATUS} post-setup, expected 0 (autodetect should pick up the lone instance)"
            echo "::error::See docs/reference/MODULE_CONTRACTS.md for the contract"
            exit 1
          fi
          echo "  ✓ spirit-preflight autodetected the instance and returned rc=0"

          # And the log prefix should reflect the autodetected name,
          # not the [no-instance] sentinel.
          if grep -q "\[no-instance\]" autodetect-preflight.log; then
            echo "::error::log prefix shows [no-instance] — autodetect didn't reach the logger"
            exit 1
          fi
          if ! grep -q "\[setup-test\]" autodetect-preflight.log; then
            echo "::error::log prefix doesn't show [setup-test] — logger autodetect broken"
            exit 1
          fi
          echo "  ✓ log prefix shows [setup-test] — logger autodetect works"

      - name: spirit-preflight loads ~/.spirit/<instance>/.env (rc4 Bug A)
        run: |
          # rc3 install test (Tim, 2026-05-19): editing
          # ~/.spirit/<instance>/.env to add SPIRIT_API_KEY did NOT make
          # spirit-preflight see the key — the file was never read. The
          # documented Pro-flip flow ("edit .env, re-run preflight, see
          # ✓ Gateway") silently failed.
          #
          # rc4 fix: config_loader._load_yaml() also calls _load_env_file()
          # on first invocation. This step writes a sentinel SPIRIT_API_KEY
          # into the instance .env, runs spirit-preflight with the env
          # var explicitly UNSET, and asserts the value reached
          # os.environ (proxy: env_vars check no longer flags it as
          # missing OR the gateway check actually attempts to use it).
          export PATH="$HOME/.local/bin:$PATH"

          # Flip the yaml to paid so the gateway-capabilities check fires
          # and SPIRIT_API_KEY becomes required.
          python3 -c "
          import pathlib, re
          p = pathlib.Path.home() / '.spirit' / 'setup-test' / 'spirit.yaml'
          src = p.read_text()
          if 'SPIRIT_TIER' in src:
              src = re.sub(r'SPIRIT_TIER:\s*\S+', 'SPIRIT_TIER: plus', src)
          else:
              src = 'SPIRIT_TIER: plus\n' + src
          p.write_text(src)
          print('Flipped SPIRIT_TIER → plus for gateway-check coverage')
          "

          # Write a sentinel key to .env (NOT a real key — just enough
          # to prove the file is read and the value reaches os.environ).
          cat >> "$HOME/.spirit/setup-test/.env" <<'EOF'
          SPIRIT_API_KEY=sk_rc4_dotenv_load_sentinel
          SPIRIT_API_URL=https://api.tradebot.live/v1
          EOF
          echo "Wrote sentinel SPIRIT_API_KEY to .env"

          # Run preflight with the env var explicitly unset — the only
          # way the value reaches preflight is via the .env load.
          set +e
          unset SPIRIT_API_KEY
          spirit-preflight > envload-preflight.log 2>&1
          STATUS=$?
          set -e
          cat envload-preflight.log

          if grep -q "Traceback\|ModuleNotFoundError" envload-preflight.log; then
            echo "::error::spirit-preflight crashed during .env-load test"
            exit 1
          fi

          # Three assertions:
          #
          # 1. env_vars check must NOT report SPIRIT_API_KEY as missing —
          #    proves the .env value reached os.environ before preflight
          #    inspected it.
          if grep -qE "Missing required env vars.*SPIRIT_API_KEY" envload-preflight.log; then
            echo "::error::env_vars still reports SPIRIT_API_KEY missing — .env load didn't happen (Bug A regressed)"
            exit 1
          fi
          echo "  ✓ env_vars check sees SPIRIT_API_KEY from .env"

          # 2. Gateway-capabilities check must have FIRED (paid tier). If
          #    .env didn't load, env_vars would FATAL out before reaching
          #    the gateway check; "Checks run: N" would be 3 instead of 4+.
          if ! grep -qE "Checks run:\s*[4-9]" envload-preflight.log; then
            echo "::error::gateway-capabilities check didn't run — env_vars probably blocked it (Bug A regressed)"
            exit 1
          fi
          echo "  ✓ gateway-capabilities check fired — .env load propagated through to paid-tier flow"

          # 3. The sentinel key gets rejected by the real gateway (it's
          #    not a real key), so the check fails with a 401-ish message.
          #    The capability summary must report "rejected", NOT
          #    "set SPIRIT_API_KEY" — that's the rc4 Bug C fix.
          if grep -qE "Gateway features.*rejected|key rejected" envload-preflight.log; then
            echo "  ✓ summary correctly reports 'key rejected' (Bug C fix verified)"
          elif grep -qE "Gateway features.*set SPIRIT_API_KEY" envload-preflight.log; then
            echo "::error::summary still says 'set SPIRIT_API_KEY' for a rejected key — Bug C regressed"
            exit 1
          fi

          # 4. The paper-trading line must NOT leak 'Free tier' on a
          #    paid-tier configuration — Bug B fix.
          if grep -qE "Paper trading.*Free tier" envload-preflight.log; then
            echo "::error::Paper trading line says 'Free tier' on a paid-tier instance — Bug B regressed"
            exit 1
          fi
          echo "  ✓ Paper trading line reflects actual tier (Bug B fix verified)"

      # ---------------------------------------------------------------
      # Gateway-success-branch coverage (#744, v2.2.3-rc5).
      #
      # The Bug A step above proves the REJECTION branch ("✗ Gateway
      # features (key rejected)"). These two steps prove the SUCCESS
      # branch ("✓ Gateway features ...") fires for both Plus and Pro
      # capability sets — the only branch a real paying customer ever
      # sees on first preflight, and the one that shipped invisibly
      # untested through rc1 → rc4.
      #
      # Each step:
      #   1. Warning-skip if the matching repo secret isn't available
      #      (fork PRs, secret not yet provisioned).
      #   2. Replace SPIRIT_API_KEY in the instance .env with the real
      #      test key.
      #   3. Run spirit-preflight, capture stdout+stderr.
      #   4. grep -F for the success line. Fail the step if missing.
      # ---------------------------------------------------------------
      - name: Assert gateway success branch (internal_test_plus)
        env:
          SPIRIT_TEST_PLUS_KEY: ${{ secrets.SPIRIT_TEST_PLUS_KEY }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          if [ -z "${SPIRIT_TEST_PLUS_KEY:-}" ]; then
            echo "::warning::SPIRIT_TEST_PLUS_KEY not set — skipping Plus success-branch assertion (fork PR or unprovisioned)"
            exit 0
          fi

          # Overwrite SPIRIT_API_KEY in the instance .env. Bug A step left
          # the yaml on tier=subscription, which is the right shape for a
          # Plus-equivalent key.
          sed -i "s|^SPIRIT_API_KEY=.*|SPIRIT_API_KEY=${SPIRIT_TEST_PLUS_KEY}|" \
            "$HOME/.spirit/setup-test/.env"

          set +e
          unset SPIRIT_API_KEY
          spirit-preflight > success-plus-preflight.log 2>&1
          STATUS=$?
          set -e
          cat success-plus-preflight.log

          if grep -q "Traceback\|ModuleNotFoundError" success-plus-preflight.log; then
            echo "::error::spirit-preflight crashed during Plus success-branch assertion"
            exit 1
          fi

          # The success-branch text is fixed-string '✓ Gateway features' —
          # grep -F avoids any regex interpretation of the checkmark.
          if ! grep -F '✓ Gateway features' success-plus-preflight.log; then
            echo "::error::Expected '✓ Gateway features' in preflight output for internal_test_plus, not found (status=${STATUS})"
            echo "::error::Either the key has been revoked, the role lost its capability set, or the success-branch text changed."
            exit 1
          fi
          echo "  ✓ Plus success-branch line present"

      - name: Assert gateway success branch (internal_test_pro)
        env:
          SPIRIT_TEST_PRO_KEY: ${{ secrets.SPIRIT_TEST_PRO_KEY }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"

          if [ -z "${SPIRIT_TEST_PRO_KEY:-}" ]; then
            echo "::warning::SPIRIT_TEST_PRO_KEY not set — skipping Pro success-branch assertion (fork PR or unprovisioned)"
            exit 0
          fi

          # Flip the yaml to tier=pro so preflight evaluates the Pro
          # capability surface (internal_test_pro mirrors pro).
          python3 -c "
          import pathlib, re
          p = pathlib.Path.home() / '.spirit' / 'setup-test' / 'spirit.yaml'
          src = p.read_text()
          if 'SPIRIT_TIER' in src:
              src = re.sub(r'SPIRIT_TIER:\s*\S+', 'SPIRIT_TIER: pro', src)
          else:
              src = 'SPIRIT_TIER: pro\n' + src
          p.write_text(src)
          "

          sed -i "s|^SPIRIT_API_KEY=.*|SPIRIT_API_KEY=${SPIRIT_TEST_PRO_KEY}|" \
            "$HOME/.spirit/setup-test/.env"

          set +e
          unset SPIRIT_API_KEY
          spirit-preflight > success-pro-preflight.log 2>&1
          STATUS=$?
          set -e
          cat success-pro-preflight.log

          if grep -q "Traceback\|ModuleNotFoundError" success-pro-preflight.log; then
            echo "::error::spirit-preflight crashed during Pro success-branch assertion"
            exit 1
          fi

          if ! grep -F '✓ Gateway features' success-pro-preflight.log; then
            echo "::error::Expected '✓ Gateway features' in preflight output for internal_test_pro, not found (status=${STATUS})"
            echo "::error::Either the key has been revoked, the role lost its capability set, or the success-branch text changed."
            exit 1
          fi
          echo "  ✓ Pro success-branch line present"

      - name: Upload upgrade logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-upgrade-${{ matrix.os }}
          path: |
            pre-health.log
            post-health.log
            post-preflight.log
            autodetect-preflight.log
            envload-preflight.log
            success-plus-preflight.log
            success-pro-preflight.log
          retention-days: 14

  rc-verdict:
    name: RC verdict (require all platforms green)
    needs: [install-matrix, upgrade-matrix]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate platform results
        run: |
          INSTALL_RESULT="${{ needs.install-matrix.result }}"
          UPGRADE_RESULT="${{ needs.upgrade-matrix.result }}"
          echo "Install matrix result:  $INSTALL_RESULT"
          echo "Upgrade matrix result:  $UPGRADE_RESULT"
          if [ "$INSTALL_RESULT" = "success" ] && [ "$UPGRADE_RESULT" = "success" ]; then
            echo "::notice::RC validation PASSED — fresh-install AND upgrade-from-PyPI green on all platforms"
            echo "Promote to full release with:  git tag ${GITHUB_REF#refs/tags/v} && git push public ${GITHUB_REF#refs/tags/v}"
            echo "  (replace -rc* suffix with the full version)"
          else
            echo "::error::RC validation FAILED"
            echo "  install-matrix: $INSTALL_RESULT"
            echo "  upgrade-matrix: $UPGRADE_RESULT"
            echo "DO NOT promote this RC to a full release."
            exit 1
          fi
