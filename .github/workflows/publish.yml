# Publish spirit-platform to PyPI / TestPyPI on tag push.
#
# Triggered by tags pushed to the public mirror repo. The rename to
# match the GitHub repo name + first PyPI publish discussion is in #705.
#
# Routing:
#   - Tags matching v*-rc* / v*-test* (e.g. v2.2.1-rc1)  →  TestPyPI
#   - Tags matching v* without rc/test                    →  PyPI
#
# Auth: trusted publishing via OIDC. NO API tokens stored anywhere.
# PyPI + TestPyPI both have pending publishers configured against
# (owner=timoz10, repo=spirit-platform, workflow=publish.yml, env=<pypi|testpypi>).
# First successful upload claims the package name and converts the
# pending publisher into an active one.
#
# Permissions:
#   id-token: write  — required for OIDC token exchange with PyPI
#   contents: read   — actions/checkout default
#
# Environment names are intentional: GitHub Environment configuration
# can later add manual-approval gates per env without changing this file.

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tag
        uses: actions/checkout@v4
        with:
          # Fetch the tag commit only — we don't need history here.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Compute wheel version from tag
        id: wheel_version
        run: |
          # The tag is the source of truth for what we publish. The
          # version on disk in pyproject.toml.public stays at the bare
          # X.Y.Z so daily dev / local builds produce predictable
          # filenames; the published wheel takes its version from the tag.
          #
          # Mapping (PEP 440 normalised):
          #   v2.2.3-rc1   → wheel version 2.2.3rc1   → routes to TestPyPI
          #   v2.2.3-rc2   → wheel version 2.2.3rc2   → routes to TestPyPI
          #   v2.2.3-test1 → wheel version 2.2.3.dev1 → routes to TestPyPI
          #   v2.2.3       → wheel version 2.2.3      → routes to real PyPI
          #
          # Each RC gets a distinct wheel filename so TestPyPI accepts
          # them without manual deletion between iterations.
          # Closes #728.
          TAG="${GITHUB_REF#refs/tags/v}"
          # Strip the dash before rc/test — PEP 440 normalises dashes out.
          # (v2.2.3-rc1 → 2.2.3rc1, not 2.2.3-rc1 which pip would reject.)
          WHEEL_VERSION="${TAG/-rc/rc}"
          WHEEL_VERSION="${WHEEL_VERSION/-test/.dev}"
          echo "version=${WHEEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: v${TAG}  →  wheel version: ${WHEEL_VERSION}"

      - name: Inject wheel version into pyproject
        run: |
          # In-place rewrite — the checkout is ephemeral, we never
          # commit this back. On the public mirror the file is already
          # renamed to pyproject.toml by git-filter-repo; on the private
          # repo (in case anyone tags there) it's still pyproject.toml.public.
          VERSION="${{ steps.wheel_version.outputs.version }}"
          if [ -f pyproject.toml ]; then
              TARGET=pyproject.toml
          elif [ -f pyproject.toml.public ]; then
              TARGET=pyproject.toml.public
          else
              echo "::error::neither pyproject.toml nor pyproject.toml.public found"
              exit 1
          fi
          echo "Rewriting ${TARGET} version → ${VERSION}"
          python3 -c "
          import re, pathlib
          p = pathlib.Path('${TARGET}')
          src = p.read_text()
          new = re.sub(
              r'^version\s*=\s*\"[^\"]*\"',
              f'version = \"${VERSION}\"',
              src,
              count=1,
              flags=re.M,
          )
          if new == src:
              raise SystemExit('::error::failed to inject version — pyproject layout changed?')
          p.write_text(new)
          "
          grep '^version = ' "${TARGET}"
          # Sync src/spirit/__init__.py for consistency — the wheel reads
          # version from pyproject; this keeps __version__ in lockstep.
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" src/spirit/__init__.py
          grep '^__version__' src/spirit/__init__.py

      - name: Build distributions
        run: python -m build

      - name: Inventory built distributions
        run: ls -la dist/

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  smoke-runtime:
    name: Runtime smoke test on built wheel
    needs: build
    runs-on: ubuntu-latest
    # Catches the v2.2.2 failure class: wheel imports cleanly but main()
    # crashes on a runtime-imported module that's missing from the bundle.
    # Installs the freshly-built wheel into a clean pipx venv and runs
    # `spirit --mode test` for 30s, then asserts: (a) no Python traceback,
    # (b) no ModuleNotFoundError, (c) preflight reached "All checks passed"
    # or "FAIL  env_vars" (both indicate main() got past imports cleanly).
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipx
        run: python -m pip install --upgrade pipx

      - name: Install built wheel via pipx
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Installing $WHEEL"
          pipx install "$WHEEL"

      # Smoke gates enforce the diagnostic-tool exit-code contracts from
      # docs/reference/MODULE_CONTRACTS.md. On a fresh CI box (no ~/.spirit/,
      # no env vars beyond the defaults set below for the spirit smoke step),
      # the EXACT expected codes are:
      #   spirit-health     → RC_NO_INSTANCES (1)
      #   spirit-preflight  → RC_DIAGNOSTIC_BLOCKING (1)  [SPIRIT_STRATEGY missing]
      # We assert these exact values, not a "0 or 1" range — drift in either
      # tool that produces a different code should fail the gate.
      - name: Smoke — spirit-health (assert RC_NO_INSTANCES=1)
        run: |
          set +e
          spirit-health > health.log 2>&1
          STATUS=$?
          set -e
          cat health.log
          if grep -q "Traceback\|ModuleNotFoundError" health.log; then
            echo "::error::spirit-health produced a Python traceback"
            exit 1
          fi
          if [ "$STATUS" -ne 1 ]; then
            echo "::error::spirit-health exited $STATUS, expected 1 (RC_NO_INSTANCES) on a fresh CI box"
            echo "::error::See docs/reference/MODULE_CONTRACTS.md for the contract"
            exit 1
          fi

      - name: Smoke — spirit-preflight (assert RC_DIAGNOSTIC_BLOCKING=1)
        run: |
          set +e
          spirit-preflight > preflight.log 2>&1
          STATUS=$?
          set -e
          cat preflight.log
          if grep -q "Traceback\|ModuleNotFoundError" preflight.log; then
            echo "::error::preflight produced a Python traceback"
            exit 1
          fi
          if [ "$STATUS" -ne 1 ]; then
            echo "::error::spirit-preflight exited $STATUS, expected 1 (RC_DIAGNOSTIC_BLOCKING) on a fresh CI box"
            echo "::error::See docs/reference/MODULE_CONTRACTS.md for the contract"
            exit 1
          fi

      - name: Smoke — spirit --mode test (30s runtime)
        run: |
          # Provide minimal env so spirit reaches main() without env-var
          # bail-out. Free-tier strategy + a synthetic pair list = paper
          # trading loop runs without needing a Kraken key.
          export SPIRIT_STRATEGY=macd_demo
          export SPIRIT_INSTANCE=ci-smoke
          export SPIRIT_PAIRS=XBTUSD
          export SPIRIT_API_KEY=ci-smoke-dummy
          export EXCHANGE_API_KEY=ci-smoke-dummy
          export EXCHANGE_API_SECRET=ci-smoke-dummy
          set +e
          timeout --preserve-status 30 spirit --mode test 2>&1 | tee runtime.log
          STATUS=$?
          set -e

          # timeout returns 124 on SIGTERM (expected — we deliberately
          # kill it). Anything else means spirit died on its own.
          if [ "$STATUS" != "124" ] && [ "$STATUS" != "143" ] && [ "$STATUS" != "0" ]; then
            echo "::error::spirit --mode test exited with $STATUS (expected 124/143 from timeout)"
            tail -40 runtime.log
            exit 1
          fi

          if grep -q "Traceback\|ModuleNotFoundError" runtime.log; then
            echo "::error::spirit --mode test produced a Python traceback"
            grep -B2 -A10 "Traceback\|ModuleNotFoundError" runtime.log
            exit 1
          fi

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            preflight.log
            runtime.log
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI (release candidates)
    needs: smoke-runtime
    runs-on: ubuntu-latest
    # Trigger TestPyPI ONLY for rc / test tags (e.g. v2.2.1-rc1).
    # Full-release tags (v2.2.1) skip this job and route to PyPI below.
    if: contains(github.ref, '-rc') || contains(github.ref, '-test')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/spirit-platform/
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # print-hash makes the run log carry the wheel SHA — useful for
          # post-publish audit of what was actually uploaded.
          print-hash: true

  publish-pypi:
    name: Publish to PyPI (full releases)
    needs: smoke-runtime
    runs-on: ubuntu-latest
    # Full-release tags only — exclude rc / test pre-release suffixes.
    if: ${{ !contains(github.ref, '-rc') && !contains(github.ref, '-test') }}
    environment:
      name: pypi
      url: https://pypi.org/project/spirit-platform/
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  create-github-release:
    name: Create GitHub Release
    # Customer-facing "this just shipped" signal. Fires AFTER the wheel
    # actually lands on (Test)PyPI so the Release body's install link
    # works at the moment the Release is published.
    #
    # GA tags become regular Releases (shown by default, email-notify
    # subscribers). RC / test tags become pre-release Releases (hidden
    # from the default Releases view, no email — opt-in via the "Show
    # pre-releases" toggle).
    #
    # Pattern: docs/RELEASE_PUBLISHING_RUNBOOK.md § 5.5.
    needs: [publish-pypi, publish-testpypi]
    if: always() && (needs.publish-pypi.result == 'success' || needs.publish-testpypi.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compose Release metadata
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          # PEP 440 wheel version (strip dash before rc/test, e.g. v2.2.3-rc8 → 2.2.3rc8)
          WHEEL_VERSION="${TAG#v}"
          WHEEL_VERSION="${WHEEL_VERSION/-rc/rc}"
          WHEEL_VERSION="${WHEEL_VERSION/-test/.dev}"
          # Bare version for CHANGELOG section lookup (e.g. 2.2.3rc8 → 2.2.3)
          BARE_VERSION="${WHEEL_VERSION%rc*}"
          BARE_VERSION="${BARE_VERSION%.dev*}"

          if [[ "$TAG" == *-rc* || "$TAG" == *-test* ]]; then
            PYPI_URL="https://test.pypi.org/project/spirit-platform/${WHEEL_VERSION}/"
            PRERELEASE=true
            INSTALL_HINT="Pre-release. Opt-in install: \`pip install --pre --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ spirit-platform==${WHEEL_VERSION}\`"
          else
            PYPI_URL="https://pypi.org/project/spirit-platform/${WHEEL_VERSION}/"
            PRERELEASE=false
            INSTALL_HINT="\`pip install --upgrade spirit-platform\` (existing install) or \`pipx install spirit-platform\` (fresh)"
          fi

          echo "wheel_version=${WHEEL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "bare_version=${BARE_VERSION}"   >> "$GITHUB_OUTPUT"
          echo "pypi_url=${PYPI_URL}"           >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}"       >> "$GITHUB_OUTPUT"
          # Multiline output value via delimiter, since INSTALL_HINT has spaces/backticks
          {
            echo "install_hint<<EOF"
            echo "$INSTALL_HINT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section
        id: notes
        run: |
          # Pull the [X.Y.Z] section out of CHANGELOG.md. Each RC of a
          # given version reuses the same section (e.g. v2.2.3 rc1-rc8
          # all see the [2.2.3] section). If no section exists, fall
          # back to a generic pointer.
          VERSION="${{ steps.meta.outputs.bare_version }}"
          SECTION=$(awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" { p = 1; print; next }
            p && /^## \[/         { exit }
            p                     { print }
          ' CHANGELOG.md)

          if [ -z "$SECTION" ]; then
            SECTION="See [CHANGELOG.md](https://github.com/timoz10/spirit-platform/blob/main/CHANGELOG.md) for changes in this release."
          fi

          {
            echo "**Install:** ${{ steps.meta.outputs.install_hint }}"
            echo
            echo "**PyPI:** ${{ steps.meta.outputs.pypi_url }}"
            echo
            echo "---"
            echo
            echo "$SECTION"
          } > /tmp/release_body.md

          echo "Body preview:"
          cat /tmp/release_body.md

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Spirit ${{ github.ref_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          body_path: /tmp/release_body.md
          # Don't fail the whole workflow if the Release already exists
          # (e.g. manually backfilled). The PyPI publish has already
          # succeeded by this point.
          fail_on_unmatched_files: false
